name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_DB: classpath_test
          POSTGRES_USER: classpath
          POSTGRES_PASSWORD: classpath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U classpath -d classpath_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://classpath:classpath_test@localhost:5432/classpath_test
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: "384"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e "./backend[dev]"
      - run: ruff check --config backend/pyproject.toml backend scripts
      - run: ruff format --check --config backend/pyproject.toml backend scripts
      - run: mypy --config-file backend/pyproject.toml backend/src backend/tests scripts
      - run: pytest backend/tests -m "not integration"
      - run: alembic -c backend/alembic.ini upgrade head
      - run: alembic -c backend/alembic.ini check
      - run: pytest backend/tests -m integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend format:check
      - run: pnpm --dir frontend typecheck
      - run: pnpm --dir frontend test -- --run
      - run: pnpm --dir frontend build

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build backend frontend
